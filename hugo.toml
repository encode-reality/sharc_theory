# ============================================================
# Site Configuration
# ============================================================
baseURL = "https://encode-reality.github.io/sharc_theory/"
languageCode = "en-us"
title = "Encode Reality"
theme = "hugo-blog-awesome"

[pagination]
  pagerSize = 10
enableEmoji = false
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# ============================================================
# Markdown Rendering (Goldmark)
# ============================================================
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$'], ['\[', '\]']]
          inline = [['$', '$'], ['\(', '\)']]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# ============================================================
# Minification
# ============================================================
[minify]
  disableXML = true
  minifyOutput = true

# ============================================================
# Theme Parameters (hugo-blog-awesome)
# ============================================================
[params]
  sitename = "Encode Reality"
  defaultColor = "dark"
  description = "Exploring computation, complex systems, and the principles that govern hierarchical organization from molecular to societal scales."
  mainSections = ['posts']
  toc = true
  tocOpen = false
  goToTop = true
  dateFormat = "January 2, 2006"

[params.author]
  name = "Miadad Kahn"
  intro = "Encode Reality"
  description = "Exploring computation, complex systems, and the principles that govern hierarchical organization from molecular to societal scales."
  # avatar = "avatar.jpg" # uncomment and place image in assets/ folder to enable

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/encode-reality/sharc_theory"

# ============================================================
# Outputs (required for search and RSS)
# ============================================================
[outputs]
  home = ["HTML", "RSS"]

# ============================================================
# Menu
# ============================================================
[[menu.main]]
  pageRef = "/"
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  pageRef = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 3

[[menu.main]]
  identifier = "repo"
  name = "GitHub"
  url = "https://github.com/encode-reality/sharc_theory"
  weight = 4
